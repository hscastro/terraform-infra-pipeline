name: "DEV DEPLOY"

on:
  push:
    branches:
      - develop

# Permission can be added at job level or workflow level
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      aws-assume-role-arn: "arn:aws:iam::082877456478:role/github-actions-hscastro-pipeline"
      aws-region: "sa-east-1"
      aws-statefile-s3-bucket: "hscastro-sa-east-1-terraform-statefile"
      aws-lock-dynamodb-table: "hscastro-sa-east-1-terraform-lock"